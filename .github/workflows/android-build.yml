name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle 8.9 (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Ensure Gradle wrapper is present
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Generating Gradle wrapper jar..."
            gradle wrapper --gradle-version 8.9 --no-daemon
          fi
          chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --no-daemon --stacktrace

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. Cannot produce a signed release."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/coolventory-release-key.p12"
          echo "Keystore decoded to a temporary file."

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/coolventory-release-key.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Build signed release AAB
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/coolventory-release-key.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Locate release APK
        id: locate_apk
        run: |
          APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "::error::No release APK found."
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK at $APK_PATH"

      - name: Verify APK signature and certificate
        run: |
          BUILD_TOOLS_DIR="$(ls -d $ANDROID_HOME/build-tools/35.0.0)"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          echo "Using apksigner at $APKSIGNER"
          CERT_OUTPUT="$($APKSIGNER verify --print-certs "${{ steps.locate_apk.outputs.apk_path }}")"
          echo "$CERT_OUTPUT"
          if echo "$CERT_OUTPUT" | grep -q "CN=Android Debug"; then
            echo "::error::Release artifact was signed with the Android Debug certificate."
            exit 1
          fi
          echo "Signature verified and not a debug certificate."

      - name: Upload signed APK (test artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coolventory-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signed AAB (Google Play artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coolventory-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
